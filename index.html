    <style>
      /* Splash screen KORRETORA — render instantâneo (sem depender de imagem) */
      #korretora-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: linear-gradient(180deg, #0a0d14 0%, #14181f 100%);
        opacity: 1;
        transition: opacity 0.35s ease-out;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #korretora-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #korretora-splash .ks-logo {
        width: 110px;
        height: 110px;
        border-radius: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #d4af64, #e8c98a);
        box-shadow: 0 10px 40px -10px rgba(212, 175, 100, 0.45);
        animation: ks-pulse 1.8s ease-in-out infinite;
        padding: 14px;
        box-sizing: border-box;
      }
      #korretora-splash .ks-logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      #korretora-splash .ks-text {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      #korretora-splash .ks-brand {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.18em;
        line-height: 1;
        color: #d4af64;
      }
      #korretora-splash .ks-tagline {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.32em;
        color: rgba(232, 220, 196, 0.55);
        line-height: 1;
      }
      #korretora-splash .ks-spinner {
        width: 26px;
        height: 26px;
        border: 2px solid rgba(212, 175, 100, 0.18);
        border-top-color: #d4af64;
        border-radius: 50%;
        animation: ks-spin 0.9s linear infinite;
      }
      @keyframes ks-pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 10px 40px -10px rgba(212, 175, 100, 0.35); }
        50% { transform: scale(1.05); box-shadow: 0 14px 50px -10px rgba(212, 175, 100, 0.55); }
      }
      @keyframes ks-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
