      /* Splash KORRETORA — boot inicial (mesmo design do KorretoraLoader) */
      #korretora-splash{position:fixed;inset:0;z-index:99999;background:#0b0e14;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;transition:opacity .35s ease-out}
      #korretora-splash.fade-out{opacity:0;pointer-events:none}
      #korretora-splash .ks-skyline{position:absolute;bottom:0;left:0;right:0;height:140px;opacity:.06;pointer-events:none}
      #korretora-splash .ks-center{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center}
      #korretora-splash .ks-stage{position:relative;width:148px;height:148px;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
      #korretora-splash .ks-orbit{position:absolute;inset:0;width:100%;height:100%;animation:ks-spin 7s linear infinite}
      #korretora-splash .ks-orbit-2{inset:10px;width:calc(100% - 20px);height:calc(100% - 20px);animation:ks-spin 11s linear infinite reverse}
      @keyframes ks-spin{to{transform:rotate(360deg)}}
      #korretora-splash .ks-logo{width:88px;height:88px;object-fit:contain;position:relative;z-index:3;animation:ks-pop .7s cubic-bezier(.34,1.56,.64,1) .2s both}
      @keyframes ks-pop{from{transform:scale(.2);opacity:0}to{transform:scale(1);opacity:1}}
      #korretora-splash .ks-brand{font-size:26px;font-weight:700;letter-spacing:-.5px;color:#fff;animation:ks-fade .5s .7s ease both}
      #korretora-splash .ks-brand em{color:#c9a227;font-style:normal}
      #korretora-splash .ks-tagline{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.32);margin-top:5px;animation:ks-fade .5s .9s ease both}
      @keyframes ks-fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
      #korretora-splash .ks-progress{margin-top:32px;z-index:5;width:260px;display:flex;flex-direction:column;gap:8px;animation:ks-fade .4s 1.1s ease both}
      #korretora-splash .ks-p-labels{display:flex;justify-content:space-between}
      #korretora-splash .ks-p-lbl{font-size:10px;color:rgba(201,162,39,.6);letter-spacing:1px;font-weight:600}
      #korretora-splash .ks-p-track{width:100%;height:2px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
      #korretora-splash .ks-p-fill{height:100%;width:35%;background:#c9a227;border-radius:99px;animation:ks-indet 1.4s ease-in-out infinite}
      @keyframes ks-indet{0%{margin-left:-35%}100%{margin-left:100%}}
      #korretora-splash .ks-p-status{font-size:11px;color:rgba(255,255,255,.32);letter-spacing:.3px;text-align:center;margin-top:2px}
      #korretora-splash .ks-badges{display:flex;gap:10px;margin-top:22px;z-index:5;animation:ks-fade .4s 1.3s ease both;flex-wrap:wrap;justify-content:center;padding:0 16px}
      #korretora-splash .ks-bdg{background:rgba(255,255,255,.03);border:.5px solid rgba(255,255,255,.08);border-radius:20px;padding:6px 14px;display:flex;align-items:center;gap:7px}
      #korretora-splash .ks-bdg-dot{width:6px;height:6px;border-radius:50%;animation:ks-blink 2s ease-in-out infinite}
      #korretora-splash .ks-bdg-dot.gold{background:#c9a227}
      #korretora-splash .ks-bdg-dot.blue{background:#4a9eff;animation-delay:.9s}
      @keyframes ks-blink{0%,100%{opacity:1}50%{opacity:.2}}
      #korretora-splash .ks-bdg-txt{font-size:11px;color:rgba(255,255,255,.55);font-weight:500}

    <script>
      // Busca stats reais para o splash (sem depender do bundle React)
      (function(){
        var SUPABASE_URL = "https://dhbmkqulpxsqigbgmeen.supabase.co";
        var ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoYm1rcXVscHhzcWlnYmdtZWVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NzQ1MzIsImV4cCI6MjA5MDU1MDUzMn0.1QG2QMzWa4I15PYADF_UoDp6oIO__euGB2Cw012kTss";
        function fetchCount(table, filter){
          return fetch(SUPABASE_URL + "/rest/v1/" + table + "?select=id" + (filter ? "&" + filter : ""), {
            headers: { apikey: ANON, Authorization: "Bearer " + ANON, Prefer: "count=exact", Range: "0-0" }
          }).then(function(r){
            var cr = r.headers.get("content-range") || "";
            var m = cr.match(/\/(\d+)$/);
            return m ? parseInt(m[1], 10) : 0;
          }).catch(function(){ return 0; });
        }
        Promise.all([
          fetchCount("brokers", "is_active=eq.true"),
          fetchCount("db_properties", "availability=eq.available")
        ]).then(function(res){
          var b = res[0], p = res[1];
          var be = document.getElementById("ks-brokers");
          var pe = document.getElementById("ks-properties");
          if (be) be.textContent = b + " corretor" + (b === 1 ? "" : "es") + " ativo" + (b === 1 ? "" : "s");
          if (pe) pe.textContent = p + " imóve" + (p === 1 ? "l" : "is") + " cadastrado" + (p === 1 ? "" : "s");
        });
      })();
    </script>
